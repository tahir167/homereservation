<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./src/css/style.css">
</head>

<body>
    <header class="h-[10vh] shadow ">
        <nav class="nav flex justify-between w-[80%] mx-auto bg-white h-[100%] items-center">
            <h1>ApartmentBooking</h1>
            <ul class="list-none  gap-7 hidden md:flex">
                <li class=""><a href="index.html">Home</a></li>
                <li><a href="apartments.html">Apartments</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class=" block md:hidden"><i class="fa-solid fa-bars"></i></div>
            <div class="navbtn  gap-8 hidden md:flex">
                <button class=" bg-white shadow w-[70px] h-[40px] rounded-md"><a href="login.html">Log in</a></button>
                <button class="w-[70px] h-[40px] bg-blue-600 rounded-md"><a href="signup.html">Sign up</a></button>
            </div>
        </nav>
    </header>
    <main class="min-h-screen flex items-center justify-center p-4">
      <section class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8 space-y-6">
        <h2 class="text-2xl font-bold text-center text-gray-800">Create an Account</h2>
        <form class="space-y-4 signupform">
          <div>
            <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
            <input type="text" name="username" id="username" class="mt-1 w-full border border-gray-300 rounded-xl p-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            <p id="usernameError" class="text-red-500 text-sm mt-1 hidden"></p>
          </div>
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
            <input type="email" name="email" id="email" class="mt-1 w-full border border-gray-300 rounded-xl p-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
            <input type="password" name="password" id="password" class="mt-1 w-full border border-gray-300 rounded-xl p-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            <p id="passwordError" class="text-red-500 text-sm mt-1 hidden"></p>
          </div>
          <div>
            <label for="Confirmpassword" class="block text-sm font-medium text-gray-700">Confirm Password</label>
            <input type="password" name="Confirmpassword" id="Confirmpassword" class="mt-1 w-full border border-gray-300 rounded-xl p-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            <p id="confirmPasswordError" class="text-red-500 text-sm mt-1 hidden"></p> <!-- Confirm Password error mesajı -->
          </div>
          <button type="submit" disabled class="w-full bg-blue-600 text-white py-2 rounded-xl hover:bg-blue-700 transition duration-200 disabled:opacity-50" id="submitbtn">Sign Up</button>
          <p class="text-center text-sm text-gray-600">
            Already have an account?
            <a href="login.html" class="text-blue-600 hover:underline">Log In</a>
          </p>
        </form>
      </section>
    </main>
      <script type="module" src="./src/js/signup.js"></script>
</body>

</html>
