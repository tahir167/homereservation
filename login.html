<body>
  <header class="h-[10vh] shadow">
    <nav class="nav flex justify-between w-[80%] mx-auto bg-white h-[100%] items-center">
      <div class="flex items-center">
        <span class="text-3xl font-semibold text-blue-600">Apart</span>
        <span class="text-3xl font-semibold text-green-600">Rezervatto</span>
      </div>
      <ul class="list-none gap-7 hidden md:flex">
        <li class=""><a href="index.html">Home</a></li>
        <li><a href="apartments.html">Apartments</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="block md:hidden">
        <i class="fa-solid fa-bars text-2xl cursor-pointer" id="hamburgerMenu"></i>
      </div>
      <ul id="mobileMenu"
          class="md:hidden hidden flex-col absolute top-[10vh] left-0 w-full bg-white shadow-lg z-50">
        <li class="border-b border-gray-200 px-4 py-3"><a href="index.html" class="block text-blue-600">Home</a></li>
        <li class="border-b border-gray-200 px-4 py-3"><a href="apartments.html" class="block">Apartments</a></li>
        <li class="border-b border-gray-200 px-4 py-3"><a href="about.html" class="block">About</a></li>
        <li class="border-b border-gray-200 px-4 py-3"><a href="contact.html" class="block">Contact</a></li>
        <li class="border-b border-gray-200 px-4 py-3"><a href="signup.html" class="block">Sign up</a></li>
        <li class="border-b border-gray-200 px-4 py-3"><a href="login.html" class="block">Log in</a></li>
      </ul>
      <div class="navbtn gap-8 hidden md:flex" id="navButtons">
        <button class="bg-white shadow w-[70px] h-[40px] rounded-md">
          <a href="login.html">Log in</a>
        </button>
        <button class="w-[70px] h-[40px] bg-blue-600 text-white rounded-md">
          <a href="signup.html">Sign up</a>
        </button>
      </div>
    </nav>
  </header> 
    <main class="min-h-screen flex items-center justify-center bg-gray-100 p-4">
    <section class="w-full max-w-sm bg-white rounded-2xl shadow-lg p-8 space-y-6">
      <h2 class="text-2xl font-bold text-center text-gray-800">Log In</h2>
      <form class="space-y-4 form" id="formlogin">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
          <input
            type="email"
            id="email"
            class="mt-1 w-full border border-gray-300 rounded-xl p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <input
            type="password"
            id="password"
            class="mt-1 w-full border border-gray-300 rounded-xl p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <button id="submitbtn"
          type="submit"
          class="w-full bg-blue-600 text-white py-2 rounded-xl hover:bg-blue-700 transition duration-200"
        >
          Log In
        </button>
      </form>
    </section>
  </main>
  <script type="module" src="./src/components/header.js"></script>
<script type="module" src="./src/js/login.js"></script>
