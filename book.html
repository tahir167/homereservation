
<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Your Stay</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./src/css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
  <header class="h-[10vh] shadow bg-white fixed top-0 left-0 w-full z-50">
    <nav class="flex justify-between items-center w-[90%] max-w-[1300px] mx-auto h-full">
      <div class="flex items-center ">
        <span class="text-3xl font-extrabold text-blue-600 tracking-wide">Apart</span>
        <span class="text-3xl font-extrabold text-green-600 tracking-wide">Rezervatto</span>
      </div>
  
      <ul class="hidden md:flex space-x-8 text-lg font-medium items-center">
        <li><a href="index.html" class=" hover:text-blue-800 transition">Home</a></li>
        <li><a href="apartments.html" class="hover:text-blue-600 transition">Apartments</a></li>
        <li><a href="about.html" class="hover:text-blue-600 transition">About</a></li>
        <li><a href="contact.html" class="hover:text-blue-600 transition">Contact</a></li>
      </ul>
  
      <div class="hidden md:flex items-center gap-4" id="navButtons">
        <a href="login.html"
          class="px-4 py-2 rounded-md border border-blue-600 text-blue-600 hover:bg-blue-600 hover:text-white transition">
          Log in
        </a>
        <a href="signup.html"
          class="px-4 py-2 rounded-md bg-blue-600 text-white hover:bg-blue-700 transition">
          Sign up
        </a>
      </div>
  
      <div class="block md:hidden">
        <i class="fa-solid fa-bars text-2xl cursor-pointer text-blue-600" id="hamburgerMenu"></i>
      </div>
    </nav>
  
  
    <ul id="mobileMenu"
      class="md:hidden hidden flex-col absolute top-[10vh] left-0 w-full bg-white shadow-lg z-40 animate-slide-down">
      <li class="border-b border-gray-200 px-4 py-3"><a href="index.html" class="block text-blue-600">Home</a></li>
      <li class="border-b border-gray-200 px-4 py-3"><a href="apartments.html" class="block">Apartments</a></li>
      <li class="border-b border-gray-200 px-4 py-3"><a href="about.html" class="block">About</a></li>
      <li class="border-b border-gray-200 px-4 py-3"><a href="contact.html" class="block">Contact</a></li>
      <li class="border-b border-gray-200 px-4 py-3"><a href="signup.html" class="block">Sign up</a></li>
      <li class="border-b border-gray-200 px-4 py-3"><a href="login.html" class="block">Log in</a></li>
    </ul>
  </header>

  <div class="flex items-center justify-center min-h-[90vh] py-8">
    <div class="booking-container bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
      <h2 class="text-2xl font-semibold mb-2 text-center">Book Your Stay</h2>
      <h3 id="apartmentTitle" class="text-lg text-center mb-1 text-gray-700">Loading apartment details...</h3>
      <p id="pricePerNight" class="text-center mb-6 text-blue-600 font-medium">--</p>
      
      <form id="bookingForm" class="space-y-6">
        <div class="form-group">
          <label for="startDate" class="block text-sm font-medium text-gray-700 mb-1">Check-in Date</label>
          <input type="date" id="startDate" name="startDate"
            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        
        <div class="form-group">
          <label for="endDate" class="block text-sm font-medium text-gray-700 mb-1">Check-out Date</label>
          <input type="date" id="endDate" name="endDate"
            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        
        <div id="totalPriceSection" class="hidden bg-blue-50 p-4 rounded-md">
          <p class="font-medium text-gray-700">Total Price:</p>
          <p id="totalPrice" class="text-xl font-bold text-blue-600">--</p>
        </div>
        
        <button type="submit"
          class="w-full py-3 bg-blue-600 text-white font-semibold rounded-md hover:bg-blue-700 transition duration-200">
          Confirm Booking
        </button>
      
      </form>
      
      <div id="message" class="mt-6 text-center"></div>
    </div>
   
  </div>

  <script type="module" src="./src/js/book.js"></script>
  <script type="module" src="./src/components/header.js"></script>
</body>

</html>
