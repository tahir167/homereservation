<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vite App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./src/css/style.css">
</head>

<body>
  <header class="h-[10vh] shadow ">
    <nav class="nav flex justify-between w-[80%] mx-auto bg-white h-[100%] items-center">
      <h1>ApartmentBooking</h1>
      <ul class="list-none  gap-7 hidden md:flex">
        <li class="text-blue-600"><a href="index.html">Home</a></li>
        <li><a href="apartments.html">Apartments</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class=" block md:hidden"><i class="fa-solid fa-bars"></i></div>
      <div class="navbtn gap-8 hidden md:flex" id="navButtons">
        <button class="bg-white shadow w-[70px] h-[40px] rounded-md">
          <a href="login.html">Log in</a>
        </button>
        <button class="w-[70px] h-[40px] bg-blue-600 text-white rounded-md">
          <a href="signup.html">Sign up</a>
        </button>
      </div>
    </nav>
  </header>
<div class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="booking-container bg-white p-8 rounded-lg shadow-lg w-full sm:w-96">
      <h2 class="text-2xl font-semibold mb-6 text-center">Book Your Stay</h2>
      <form id="bookingForm" class="space-y-4">
        <div class="form-group">
          <label for="startDate" class="block text-sm font-medium text-gray-700">Start Date</label>
          <input type="date" id="startDate" name="startDate"
            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <div class="form-group">
          <label for="endDate" class="block text-sm font-medium text-gray-700">End Date</label>
          <input type="date" id="endDate" name="endDate"
            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <button type="submit"
          class="w-full py-2 bg-blue-600 text-white font-semibold rounded-md hover:bg-blue-700 transition duration-200">
          Confirm Booking
        </button>
      </form>
      <div id="message" class="mt-4 text-center text-red-600"></div>
    </div>
  
</div>



<script type="module" src="./src/js/book.js"></script>
  <script type="module" src="./src/components/header.js"></script>
</body>

</html>
